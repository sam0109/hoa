name: Task
description: A unit of work to be planned and executed by an agent
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done? Be specific and verifiable.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0: critical
        - P1: high
        - P2: medium
        - P3: low
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Relevant files, prior art, constraints, or links
    validations:
      required: false
